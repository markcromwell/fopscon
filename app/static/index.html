<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Foundation Operator Console</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#0c0c0e; --surface:#16161a; --surface-2:#1b1b20; --surface-3:#212127;
    --line:rgba(255,255,255,.065); --line-strong:rgba(255,255,255,.13); --grid:#232329;
    --ink:#f2f2ee; --ink-2:#c3c2b7; --ink-3:#8b897f;
    --good:#0ca30c; --good-hi:#2ec02e; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b; --crit-hi:#e25a5a;
    --accent:#3987e5; --aqua:#199e70; --gold:#c98500; --violet:#9085e9;
    --accent-text:#7db3f0; --violet-text:#b0a7f2; --on-accent:#ffffff; --on-warn:#161005;
    --r-lg:16px; --r-md:11px; --r-sm:7px; --r-pill:999px;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"Cascadia Mono","Segoe UI Mono",Consolas,monospace;
    --ink-soft:var(--ink-2); --ink-faint:var(--ink-3);
    --two-key:var(--good-hi); --one-key:var(--warn); --vacuous:var(--serious); --blocked:var(--crit-hi); --unknown:var(--ink-3);
    --t-11:.6875rem; --t-12:.75rem; --t-13:.8125rem; --t-14:.875rem; --t-16:1rem; --t-18:1.125rem; --t-22:1.375rem; --t-28:1.75rem; --t-34:2.125rem;
  }
  *{box-sizing:border-box}
  html{scrollbar-color:var(--surface-3) var(--bg)}
  body{margin:0; min-height:100vh; overflow-x:hidden}
  body{background:var(--bg); color:var(--ink); font:14px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility}
  ::selection{background:rgba(57,135,229,.35)}
  a{color:inherit}
  button{font:inherit; color:inherit}
  :focus-visible{outline:3px solid rgba(57,135,229,.4); outline-offset:2px; border-radius:var(--r-sm)}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none !important; transition:none !important}}

  .app-shell{display:grid; grid-template-columns:252px minmax(0,1fr); min-height:100vh}
  .side{position:sticky; top:0; height:100vh; display:flex; flex-direction:column; z-index:10;
    border-right:1px solid var(--line); background:linear-gradient(180deg,var(--surface),var(--bg) 44%);
    padding:22px 16px 16px}
  .brand{display:flex; align-items:center; gap:10px; padding:0 6px 24px; text-decoration:none}
  .brand .mark{width:30px; height:30px; flex:none}
  .brand b{display:block; font-size:15px; letter-spacing:.02em}
  .brand span{display:block; margin-top:1px; font-size:10.5px; color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase}
  .raillabel,.micro{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
  .raillabel{padding:0 8px 10px}
  .rail{display:flex; flex-direction:column; position:relative}
  .rail::before{content:""; position:absolute; left:21px; top:18px; bottom:18px; width:1.5px;
    background:linear-gradient(180deg,rgba(57,135,229,.5),rgba(57,135,229,.14) 55%,rgba(255,255,255,.08))}
  .rstep{display:flex; align-items:center; gap:12px; position:relative; z-index:1; border-radius:var(--r-sm);
    padding:10px 8px; color:var(--ink-2); text-align:left; text-decoration:none; font-weight:500; font-size:13.5px}
  .rstep:hover{background:rgba(255,255,255,.045); color:var(--ink)}
  .rstep.on{background:rgba(57,135,229,.13); color:var(--ink)}
  .rstep.seat{margin-top:10px}
  .rstep .glyph{width:28px; height:28px; border-radius:50%; flex:none; display:grid; place-items:center;
    background:var(--surface-2); border:1.5px solid var(--line-strong)}
  .rstep .glyph svg{width:14px; height:14px; color:var(--ink-3)}
  .rstep.on .glyph{border-color:var(--accent); background:rgba(57,135,229,.14); box-shadow:0 0 0 3px rgba(57,135,229,.12)}
  .rstep.on .glyph svg{color:var(--accent)}
  .rstep.seat .glyph{border-style:dashed}
  .rstep .lbl{min-width:0}
  .rstep .lbl small{display:block; font-size:10.5px; color:var(--ink-3); letter-spacing:.04em; font-weight:500}
  .badge{margin-left:auto; min-width:20px; height:20px; border-radius:var(--r-pill); background:var(--warn); color:var(--on-warn);
    font-size:11px; font-weight:800; display:grid; place-items:center; padding:0 6px}
  .badge[data-count="0"],.badge:empty{display:none}
  .side .foot{margin-top:auto; padding:14px 8px 0; border-top:1px solid var(--line)}
  .loopline{display:flex; align-items:center; gap:10px; color:var(--ink-2); font-size:12.5px}
  .loopline small{display:block; color:var(--ink-3); font-size:11px}
  .loopring{width:18px; height:18px; flex:none}
  .loopring circle.trk{fill:none; stroke:rgba(255,255,255,.12); stroke-width:2}
  .loopring circle.arc{fill:none; stroke:var(--good-hi); stroke-width:2; stroke-linecap:round; stroke-dasharray:12 32;
    transform-origin:center; animation:orbit 4.6s linear infinite}
  .loopline.quiet .loopring circle.arc{stroke:var(--ink-3); stroke-dasharray:1 4; animation:none}
  @keyframes orbit{to{transform:rotate(360deg)}}

  main,.main{min-width:0; max-width:1120px; width:100%; margin:0 auto; padding:26px 32px 70px}
  h1{font-size:var(--t-22); margin:.2rem 0 .1rem; letter-spacing:0; font-weight:650}
  .sub{color:var(--ink-3); font-size:var(--t-13); margin:0 0 1rem}
  .spacer{flex:1}
  .grid{display:grid; gap:.9rem; grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr))}
  .card,.door,.vision,.needs-item,.empty-state,.spec,.feed,.stall,.idle,.living-window,.notlive,.signin-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 8px 28px -18px rgba(0,0,0,.7)}
  .card{padding:1rem; display:flex; flex-direction:column; gap:.6rem; text-align:left; font:inherit; color:inherit; cursor:pointer; width:100%}
  .card:hover,.chip:hover,.schip:hover{border-color:rgba(57,135,229,.42)}
  .row,.card .row,.actions,.toolbar,.needs-meta,.spec-head,.living-top,.vitals{display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; color:var(--ink)}
  .card-actions{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.1rem}
  .card-action,.new-idea{display:inline-flex; align-items:center; min-height:34px; font-size:var(--t-12); font-weight:700;
    color:var(--accent-text); background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-pill);
    padding:.25rem .65rem; text-decoration:none; cursor:pointer}
  .new-idea,.btn{background:var(--accent); border-color:var(--accent); color:var(--on-accent)}
  .code{font-size:var(--t-12); font-weight:700; letter-spacing:.04em; color:var(--ink-3)}
  .stage,.program-pill,.spec-id,.spec-status,.spec-badge{border:1px solid var(--line); background:var(--surface-2); border-radius:var(--r-pill);
    color:var(--ink-2); font-size:var(--t-12); padding:.15rem .5rem}
  .idea,.statement{color:var(--ink)}
  .trust{display:flex; flex-direction:column; gap:.35rem}
  .mixbar{display:flex; height:8px; border-radius:var(--r-pill); overflow:hidden; background:var(--surface-2)}
  .mixbar i{display:block; height:100%}
  .mixbar i.two-key{background:var(--two-key)} .mixbar i.one-key{background:var(--one-key)}
  .mixbar i.vacuous{background:var(--vacuous)} .mixbar i.blocked{background:var(--blocked)} .mixbar i.unknown{background:var(--unknown)}
  .mixbar.empty{background:repeating-linear-gradient(45deg,var(--surface-2),var(--surface-2) 5px,var(--surface-3) 5px,var(--surface-3) 10px)}
  .cap,.note{font-size:var(--t-12); color:var(--ink-3)}
  .cap.nodata{font-style:italic}
  .state{font-size:var(--t-13); color:var(--ink-2); padding:2rem 0}
  .err{color:var(--crit-hi)}

  .screen-new,.door-col{max-width:820px}
  .back{font-size:var(--t-13); color:var(--ink-2); text-decoration:none; padding:.35rem .6rem; border-radius:var(--r-sm)}
  .vhead{display:flex; align-items:flex-end; gap:14px; margin-bottom:8px; flex-wrap:wrap}
  .vhead p{color:var(--ink-3); font-size:13px; max-width:660px; margin:0}
  .live{display:inline-flex; align-items:center; gap:7px; margin-left:auto; border:1px solid var(--line-strong); border-radius:var(--r-pill);
    padding:4px 12px 4px 9px; font-size:11px; letter-spacing:.12em; color:var(--ink-2); text-transform:uppercase; font-weight:600; white-space:nowrap}
  .live i{width:7px; height:7px; border-radius:50%; background:var(--good-hi); animation:pulse 2.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(46,192,46,.5)}55%{box-shadow:0 0 0 6px rgba(46,192,46,0)}}
  .hero{text-align:center; padding:18px 8px 26px}
  .hero h2{font-size:var(--t-34); font-weight:680; letter-spacing:0; line-height:1.2; margin:.2rem 0}
  .hero h2 em{font-style:normal; background:linear-gradient(92deg,var(--accent-text),var(--accent) 45%,var(--violet));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .hero p{margin:12px auto 0; max-width:600px; color:var(--ink-2); font-size:14.5px; line-height:1.55}
  .covenant{margin-top:14px; font-size:12.5px; color:var(--ink-3)}
  .covenant b{color:var(--ink-2); font-weight:600}
  .ideaframe{border-radius:18px; padding:1.5px; max-width:760px; margin:0 auto;
    background:linear-gradient(150deg,rgba(57,135,229,.5),rgba(144,133,233,.45) 45%,rgba(25,158,112,.28) 78%,rgba(255,255,255,.08));
    box-shadow:0 30px 80px -34px rgba(57,135,229,.24),0 24px 70px -30px rgba(144,133,233,.18)}
  .ideabox{background:var(--surface-2); border-radius:17px; padding:18px; display:flex; flex-direction:column; gap:12px}
  label.field,.ideabox label,.samples-h{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
  .idea-input,.resolve-note{width:100%; resize:vertical; font:inherit; border:1px solid var(--line); border-radius:var(--r-sm);
    background:var(--surface-3); color:var(--ink)}
  .idea-input{min-height:92px; font-size:var(--t-16); line-height:1.45; padding:12px 13px}
  .idea-input::placeholder{color:var(--ink-3)}
  .idea-input:focus{outline:none; border-color:rgba(57,135,229,.5)}
  .btn{font:inherit; font-size:var(--t-14); font-weight:650; padding:.62rem 1rem; border-radius:10px; border:1px solid; cursor:pointer}
  .btn.ghost{background:transparent; color:var(--accent-text); border-color:var(--line-strong)}
  .btn.danger{border-color:var(--crit); background:var(--crit)}
  .btn.approve{background:rgba(12,163,12,.12); border-color:rgba(46,192,46,.42); color:var(--good-hi)}
  .btn.locked{background:var(--surface-2); border-color:var(--line-strong); color:var(--ink-3)}
  .btn[disabled]{opacity:.55; cursor:default}
  .samples{display:flex; flex-direction:column; gap:.5rem; max-width:760px; margin:16px auto 0}
  .chip,.schip{text-align:left; font:inherit; font-size:var(--t-13); color:var(--ink-2); background:var(--surface-2);
    border:1px solid var(--line-strong); border-radius:var(--r-md); padding:.7rem .8rem; cursor:pointer}
  .schip{display:flex; align-items:center; gap:9px}
  .schip::before{content:"+"; color:var(--ink-3); font-weight:700}
  .validation{min-height:1.2rem; font-size:var(--t-13); color:var(--crit-hi)}
  .panel{margin-top:1.2rem}
  .shaping{padding:18px 20px; display:flex; align-items:center; gap:11px; color:var(--ink-2); font-size:13.5px}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--accent); animation:softpulse 1.1s ease-in-out infinite}
  @keyframes softpulse{0%,100%{opacity:.25}50%{opacity:1}}
  .vision{padding:22px; display:flex; flex-direction:column; gap:18px}
  .vquote{font-size:12px; font-style:italic; color:var(--ink-3)}
  .statement{font-size:var(--t-18); font-weight:640; line-height:1.45}
  .epics{display:flex; flex-direction:column; gap:14px}
  .epic{border-left:2px solid var(--line-strong); padding-left:13px}
  .epic h3{margin:0 0 6px; font-size:var(--t-14)}
  .epic ul{margin:0; padding-left:1.1rem; color:var(--ink-2); font-size:var(--t-13); line-height:1.5}
  .vgrade{border-radius:var(--r-md); padding:14px 16px; border:1px solid; display:flex; flex-direction:column; gap:12px}
  .vgrade .gtop{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .vgrade .gnum{font-size:var(--t-28); font-weight:680; line-height:1; font-variant-numeric:tabular-nums}
  .vgrade .gmeta{display:flex; flex-direction:column; gap:2px}
  .vgrade .gverdict{font-size:15px; font-weight:700}
  .vgrade .gmeasured{font-size:11.5px; color:var(--ink-3); font-family:var(--mono)}
  .gmeter{height:8px; border-radius:4px; position:relative}
  .gmeter .trk{position:absolute; inset:0; border-radius:4px; opacity:.16}
  .gmeter .fill{position:absolute; left:0; top:0; bottom:0; border-radius:4px}
  .gmeter .notch{position:absolute; top:-3px; bottom:-3px; width:1px; background:var(--line-strong)}
  .vgrade.ready{background:rgba(12,163,12,.10); border-color:rgba(46,192,46,.42)}
  .vgrade.ready .gnum,.vgrade.ready .gverdict{color:var(--good-hi)}
  .vgrade.ready .gmeter .trk,.vgrade.ready .gmeter .fill{background:var(--good)}
  .vgrade.notready{background:rgba(236,131,90,.10); border-color:rgba(236,131,90,.42)}
  .vgrade.notready .gnum,.vgrade.notready .gverdict{color:var(--serious)}
  .vgrade.notready .gmeter .trk,.vgrade.notready .gmeter .fill{background:var(--serious)}
  .findings{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:10px}
  .finding{display:flex; gap:10px; font-size:var(--t-13); line-height:1.45}
  .sev{flex:none; margin-top:1px; font-size:9.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    padding:2px 7px; border-radius:4px; border:1px solid var(--line-strong); height:fit-content}
  .sev.high,.sev.critical{color:var(--crit-hi); border-color:rgba(226,90,90,.45)}
  .sev.medium,.sev.med{color:var(--serious); border-color:rgba(236,131,90,.45)}
  .sev.low{color:var(--warn); border-color:rgba(250,178,25,.45)}
  .findings-h{font-size:var(--t-13); font-weight:650; color:var(--ink-2); margin:.2rem 0 .1rem}
  .datafail{border:1px solid rgba(250,178,25,.45); background:var(--surface-2); border-radius:var(--r-md); padding:1rem; color:var(--ink-2)}
  .datafail .pip{display:inline-grid; place-items:center; width:18px; height:18px; border:1px dashed var(--warn); color:var(--warn); border-radius:50%; margin-right:.45rem}
  .datafail code{font-family:var(--mono); color:var(--warn)}
  .confirm{border:1px solid var(--line); background:var(--surface-2); border-radius:var(--r-md); padding:.8rem; display:flex; flex-direction:column; gap:.65rem}
  .success{border:1px solid rgba(46,192,46,.42); background:rgba(12,163,12,.10); border-radius:var(--r-md); padding:.85rem; color:var(--ink); font-size:var(--t-14)}

  .screen-needs{max-width:520px}.needs-shell,.needs-list,.build-shell,.builds,.living-shell{display:flex; flex-direction:column; gap:.85rem; min-width:0; color:var(--ink)}
  .needs-shell .vhead{margin-bottom:0}.needs-lede{max-width:460px; width:100%; margin:.25rem auto 0}
  .needs-count{display:inline-flex; align-items:center; gap:.45rem; margin-left:auto; border:1px solid var(--warn); background:var(--surface-2); border-radius:var(--r-pill); padding:.25rem .75rem .25rem .65rem; font-size:var(--t-11); letter-spacing:.1em; color:var(--warn); text-transform:uppercase; font-weight:750; white-space:nowrap; font-variant-numeric:tabular-nums}
  .needs-count b{font-size:var(--t-13); color:var(--warn)}
  .needs-list{width:100%; max-width:460px; margin:0 auto; display:flex; flex-direction:column; gap:.75rem}
  .needs-item{padding:.95rem 1rem; max-width:100%; display:flex; flex-direction:column; gap:.7rem}
  .needs-item[aria-expanded="true"]{border-color:var(--accent)}
  .needs-item:first-child{border-color:var(--warn); box-shadow:inset 0 1px 0 var(--line),0 8px 28px -18px var(--bg),0 0 22px -12px var(--warn)}
  .kind-tag{font-size:var(--t-11); text-transform:uppercase; letter-spacing:.09em; font-weight:750; padding:.12rem .5rem; border-radius:var(--r-sm); border:1px solid; background:var(--surface); color:var(--ink-2)}
  .kind-tag.two-key,.kind-tag.signoff{color:var(--two-key); border-color:var(--two-key)}.kind-tag.one-key,.kind-tag.clarify{color:var(--accent-text); border-color:var(--accent)}.kind-tag.vacuous,.kind-tag.prioritize{color:var(--violet-text); border-color:var(--violet)}.kind-tag.blocked,.kind-tag.steer{color:var(--blocked); border-color:var(--blocked)}.kind-tag.unknown{color:var(--unknown); border-color:var(--line-strong)}
  .needs-age{margin-left:auto; font-size:var(--t-11); color:var(--ink-3); white-space:nowrap; font-variant-numeric:tabular-nums}.needs-ask{font-size:var(--t-14); font-weight:500; line-height:1.45; color:var(--ink); overflow-wrap:anywhere}.needs-action{min-height:44px; border-radius:var(--r-sm); display:inline-flex; align-items:center; justify-content:center; gap:.45rem}
  .assurance-empty,.resolve-box{display:flex; gap:.5rem; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-md); padding:.65rem}
  .assurance-empty{align-items:center; font-size:var(--t-12); color:var(--ink-3)}.assurance-empty .hatch{width:36px; height:10px; flex:none; border-radius:var(--r-sm); background:repeating-linear-gradient(45deg,var(--unknown),var(--unknown) 3px,var(--surface-2) 3px,var(--surface-2) 6px)}
  .resolve-box{flex-direction:column; border-color:var(--accent)}.decision-row{display:flex; flex-wrap:wrap; gap:.5rem; color:var(--ink)}.decision-row .btn{min-height:44px; flex:1 1 9rem}.decision-row .decision-option{background:var(--surface); color:var(--ink-2); border-color:var(--line-strong)}.decision-row .btn[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:var(--on-accent)}
  .decision-row .decision-option.two-key{color:var(--two-key); border-color:var(--two-key)}.decision-row .decision-option.blocked{color:var(--blocked); border-color:var(--blocked)}
  .resolve-note{min-height:58px; font-size:var(--t-14); line-height:1.35; padding:.55rem}.tapcount{font-size:var(--t-11); color:var(--ink-3); font-style:italic}
  .empty-state{padding:1.9rem 1.35rem; text-align:center; display:flex; flex-direction:column; gap:.5rem; align-items:center}.empty-state .ering{width:38px; height:38px; border-radius:50%; border:1.5px solid var(--two-key); display:grid; place-items:center; color:var(--two-key); margin-bottom:.15rem}.empty-state .big,.idle .big,.notlive .big{font-size:var(--t-18); font-weight:750; color:var(--two-key)}.empty-state .small,.idle .small,.notlive .small{font-size:var(--t-13); color:var(--ink-3); line-height:1.5}.needs-truncated{font-size:var(--t-12); color:var(--ink-2); border:1px dashed var(--line); border-radius:var(--r-md); padding:.65rem .75rem; background:var(--surface)}

  .screen-build{max-width:920px}.builds{color:var(--ink)}.build-layout{display:grid; grid-template-columns:1fr; gap:1rem; min-width:0}.spec{padding:.95rem; min-width:0; color:var(--ink)}.spec.has-failure{border-color:rgba(226,90,90,.45)}.spec.has-unknown{border-color:rgba(250,178,25,.45)}
  .spec-title{font-size:var(--t-16); font-weight:650; min-width:0; overflow-wrap:anywhere}.spec-badge.failure{color:var(--blocked); border-color:var(--blocked)}.spec-badge.unknown{color:var(--one-key); border-color:var(--one-key)}
  .phases-scroll{margin-top:.7rem; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch}.phases{display:flex; flex-direction:column; gap:.4rem; min-width:360px}
  .phase{display:flex; align-items:center; gap:.55rem; padding:.52rem .6rem; border:1px solid var(--line); border-radius:var(--r-md); background:var(--surface-2); min-height:44px}.phase.failing{border-color:var(--blocked); background:rgba(208,59,59,.12)}.phase.unknown,.phase-unavailable{border-color:rgba(250,178,25,.45); background:rgba(250,178,25,.10)}
  .seq{flex:none; width:1.45rem; height:1.45rem; border-radius:var(--r-pill); display:grid; place-items:center; font-size:var(--t-11); font-weight:750; color:var(--ink-2); background:var(--surface); border:1px solid var(--line)}
  .phase-main{display:flex; flex-direction:column; gap:.05rem; min-width:9rem}.phase-title{font-size:var(--t-13); font-weight:650; color:var(--ink); white-space:nowrap}.phase-meta{font-size:var(--t-12); color:var(--ink-3); white-space:nowrap}
  .gate-chip{margin-left:auto; display:inline-flex; align-items:center; gap:.3rem; flex:none; font-size:var(--t-11); font-weight:750; border-radius:var(--r-sm); border:1px solid var(--line); padding:.13rem .45rem; color:var(--ink-2); background:var(--surface); white-space:nowrap}

<body>
<div id="signin" role="dialog" aria-modal="true" aria-label="Sign in">

    <h2>Foundation Operator Console</h2>

    <div id="g_id_onload"
         data-client_id="914839164404-675qnmh7juchfrsh89674dat47qelbg7.apps.googleusercontent.com"
         data-callback="onGoogleCredential" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
         data-text="signin_with" data-shape="pill"></div>
    <p id="signin-msg" class="err" role="alert"></p>
  </div>
</div>
<div class="app-shell">
  <aside class="side" id="shell-side"></aside>
  <main id="app" class="main" aria-live="polite"></main>

<script>
const STATES = ["two-key","one-key","vacuous","blocked","unknown"];
const KEYMAP = {two_key:"two-key", one_key:"one-key", vacuous:"vacuous", blocked:"blocked", unknown:"unknown"};
const IDEA_KEY = "fops_last_idea";
const CREATED_KEY = "fops_created_program";
const STORY_CAP = 200;
const NEEDS_ITEM_CAP = 200;
const DRAFT_TIMEOUT_MS = 240000;
const BUILD_POLL_MS = 10000;
const BUILD_FEED_CAP = 30;
const LIVING_FEATURE_CAP = 50;
const samples = [
  "A local-first CRM that reminds a solo founder who they have gone quiet on, and drafts the re-intro.",
  "A budgeting app that splits a shared bill by who ate what.",
  "A reading tracker that turns a stack of PDFs into a weekly progress arc."
];
let draftState = {idea:"", vision:null, inFlight:false, error:"", timedOut:false, startOpen:false, starting:false, created:null};
let needsState = {items:[], count:0, source:"", degraded:[], loading:false, error:"", openId:"", decision:"", resolving:false, note:""};
let buildState = {program:"", data:null, loading:false, error:"", poll:null, controller:null, seq:0};
let livingState = {program:"", data:null, loading:false, error:"", controller:null, seq:0};
let shellState = {needsCount:0, lastIncrementAt:null, loopLive:false};
const STEPS = [
  {id:"idea", label:"Idea → Vision", sub:"where it begins", href:"#/new", icon:"spark"},
  {id:"program", label:"Vision → Program", sub:"watch it take shape", href:"#/", icon:"cycle"},
  {id:"living", label:"The Living Program", sub:"your idea, running", href:"#/", icon:"heart"},
  {id:"guide", label:"Guide", sub:"your hand on the wheel", href:"#needs", icon:"hand", seat:true},
  {id:"maintain", label:"Maintain", sub:"never done, by design", href:"#/", icon:"loop"}
];

// Trust Strip renderer — the ONE component (design §3). Renders a mixbar from counts + a DATA-COMPUTED
// caption. Never emits a static universal claim; an empty manifest renders an honest hatched bar + the
// server's honest caption ("no assurance data yet"). This is DoS #2 (static_unconditional_trust_claims=0).
function trustStrip(strip){
  const el = document.createElement("div"); el.className = "trust";
  const counts = strip.counts || {}; const total = strip.total || 0;
  const bar = document.createElement("div"); bar.className = "mixbar" + (total ? "" : " empty");
  bar.setAttribute("role","img");
  bar.setAttribute("aria-label", strip.caption || "no assurance data yet");
  if(total){
    for(const raw of ["two_key","one_key","vacuous","blocked","unknown"]){
      const n = counts[raw] || 0; if(!n) continue;
      const seg = document.createElement("i"); seg.className = KEYMAP[raw];
      seg.style.flex = String(n); bar.appendChild(seg);
    }
  }
  const cap = document.createElement("div");
  cap.className = "cap" + (total ? "" : " nodata");
  cap.textContent = strip.caption || "no assurance data yet";  // computed by the server, never asserted
  el.append(bar, cap);
  return el;
}

function card(p){
  const c = document.createElement("button"); c.className = "card"; c.type = "button";
  c.setAttribute("aria-label", `${p.name} — ${p.lifecycle_stage}`);
  const codeValue = p.code || p.id || "";
  const row = document.createElement("div"); row.className = "row";
  const code = document.createElement("span"); code.className = "code"; code.textContent = p.code || "";
  const stage = document.createElement("span"); stage.className = "stage"; stage.textContent = p.lifecycle_stage || "";
  row.append(code, stage);
  const idea = document.createElement("div"); idea.className = "idea";
  idea.textContent = p.idea_sentence || p.name || p.code || "—";
  const actions = el("div", {class:"card-actions"},
    el("span", {class:"card-action", role:"link", tabindex:"0", "data-living-open":codeValue, text:"Living / open"})
  );
  const living = actions.querySelector("[data-living-open]");
  living.addEventListener("click", ev => {
    ev.stopPropagation();
    location.hash = "#program/" + encodeURIComponent(codeValue) + "/living";
  });
  living.addEventListener("keydown", ev => {
    if(ev.key === "Enter" || ev.key === " "){
      ev.preventDefault();
      ev.stopPropagation();
      location.hash = "#program/" + encodeURIComponent(codeValue) + "/living";
    }
  });
  c.append(row, idea, trustStrip(p.trust_strip || {}), actions);
  c.addEventListener("click", () => { location.hash = "#program/" + encodeURIComponent(p.code || p.id || "") + "/build"; });
  return c;
}

// ── auth: a Google id_token bearer, stored per session; unauth -> sign-in screen (DoS #4) ──
const TOKEN_KEY = "fops_idtoken";
function getToken(){ try{ return localStorage.getItem(TOKEN_KEY) || ""; }catch(_){ return ""; } }
function setToken(t){ try{ t ? localStorage.setItem(TOKEN_KEY,t) : localStorage.removeItem(TOKEN_KEY); }catch(_){}}
function authFetch(url, options){
  const h = {"Accept":"application/json"}; const t = getToken(); if(t) h["Authorization"] = "Bearer " + t;
  const opts = options || {};
  const headers = Object.assign(h, opts.headers || {});
  return fetch(url, Object.assign({}, opts, {headers}));
}
function showSignIn(msg){
  document.getElementById("signin").classList.add("show");
  if(msg) document.getElementById("signin-msg").textContent = msg;
}
function hideSignIn(){ document.getElementById("signin").classList.remove("show"); }
// GSI credential callback (declared on window for the data-callback attribute)
window.onGoogleCredential = function(resp){
  if(resp && resp.credential){ setToken(resp.credential); hideSignIn(); init(); }
};

function el(tag, attrs, ...children){
  const node = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs || {})){
    if(k === "class") node.className = v;
    else if(k === "text") node.textContent = v;
    else if(k === "html") node.innerHTML = v;
    else if(k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else if(v !== false && v != null) node.setAttribute(k, v === true ? "" : String(v));
  }
  for(const child of children.flat()){
    if(child == null) continue;
    node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return node;
}

function app(){ return document.getElementById("app"); }
function setStored(key, value){ try{ value ? sessionStorage.setItem(key, value) : sessionStorage.removeItem(key); }catch(_){} }
function getStored(key){ try{ return sessionStorage.getItem(key) || ""; }catch(_){ return ""; } }

function currentStepId(){
  const h = location.hash || "#/";
  if(h === "#/new" || location.pathname === "/new") return "idea";
  if(h === "#needs" || h === "#/needs" || location.pathname === "/needs") return "guide";
  if(/#\/?program\/[^/]+\/living$/.test(h) || /\/program\/[^/]+\/living$/.test(location.pathname)) return "living";
  if(/#\/?program\/[^/]+\/build$/.test(h) || /\/program\/[^/]+\/build$/.test(location.pathname)) return "program";
  return "idea";
}

function shellIcon(name){
  const common = 'viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  const paths = {
    spark:'<path d="M8 1.6v3M8 11.4v3M1.6 8h3M11.4 8h3M3.5 3.5l2.1 2.1M10.4 10.4l2.1 2.1M12.5 3.5l-2.1 2.1M5.6 10.4l-2.1 2.1"/>',
    cycle:'<path d="M13.2 8a5.2 5.2 0 1 1-1.6-3.75"/><path d="M13.4 1.8v2.7h-2.7"/>',
    heart:'<path d="M8 13.6S2 9.9 2 5.9a3.1 3.1 0 0 1 6-1.2A3.1 3.1 0 0 1 14 5.9c0 4-6 7.7-6 7.7z"/>',
    hand:'<path d="M4.6 7.4V3.2a1.1 1.1 0 0 1 2.2 0V7M6.8 6.8V2.2a1.1 1.1 0 0 1 2.2 0v4.6M9 7V3.4a1.1 1.1 0 0 1 2.2 0V8"/><path d="M11.2 8V6.6a1.1 1.1 0 0 1 2.2.4c0 2.4-.4 4.2-1.4 5.4-.9 1.1-2.2 1.6-3.8 1.6-2.6 0-3.7-1.3-5.2-4.2-.5-.9.6-1.9 1.5-1.2l1.1 1"/>',
    loop:'<path d="M8 8c-1.4-1.9-2.4-2.9-3.8-2.9a2.9 2.9 0 0 0 0 5.8C5.6 10.9 6.6 9.9 8 8zm0 0c1.4 1.9 2.4 2.9 3.8 2.9a2.9 2.9 0 0 0 0-5.8C10.4 5.1 9.4 6.1 8 8z"/>'
  };
  return `<svg ${common} aria-hidden="true">${paths[name] || paths.spark}</svg>`;
}

function renderShellChrome(){
  const side = document.getElementById("shell-side");
  if(!side) return;
  const active = currentStepId();
  side.innerHTML = "";
  const brand = el("a", {class:"brand", href:"#/new", "aria-label":"Foundation Vision Journey"});
  brand.innerHTML = '<svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true"><circle cx="16" cy="16" r="12.5" stroke="var(--accent)" stroke-width="2.4" stroke-dasharray="52 27" stroke-linecap="round" transform="rotate(-58 16 16)"/><circle cx="16" cy="16" r="4.4" fill="var(--ink)"/><circle cx="27.2" cy="9.4" r="2.6" fill="var(--good)"/></svg><div><b>Foundation</b><span>Vision Journey</span></div>';
  const nav = el("nav", {class:"rail", "aria-label":"Journey"});
  STEPS.forEach(step => {
    const isOn = step.id === active;
    let href = step.href;
    if(step.id === "program" && buildState.program) href = "#program/" + encodeURIComponent(buildState.program) + "/build";
    if(step.id === "living" && (livingState.program || buildState.program)) href = "#program/" + encodeURIComponent(livingState.program || buildState.program) + "/living";
    const link = el("a", {class:"rstep" + (isOn ? " on" : "") + (step.seat ? " seat" : ""), href});
    if(isOn) link.setAttribute("aria-current", "page");
    link.innerHTML = `<span class="glyph">${shellIcon(step.icon)}</span><span class="lbl">${step.label}<small>${step.sub}</small></span>`;
    if(step.id === "guide" && shellState.needsCount > 0){
      link.appendChild(el("span", {class:"badge", id:"needs-badge", "data-count":shellState.needsCount, text:String(shellState.needsCount)}));
    }
    nav.appendChild(link);
  });
  side.append(brand, el("div", {class:"raillabel", text:"Your idea's journey"}), nav, renderLoopHeartbeat());
}

function renderLoopHeartbeat(){
  const stamp = shellState.lastIncrementAt;
  if(!stamp){
    console.warn("shell heartbeat honest-abstain: no last increment timestamp");
    return el("div", {class:"foot"}, el("div", {class:"loopline quiet", role:"status"},
      loopRing(), el("div", {}, "Loop quiet", el("small", {text:"loop quiet · no recent increment"}))
    ));
  }
  const age = freshnessLabel(stamp);
  return el("div", {class:"foot"}, el("div", {class:"loopline", role:"status"},
    loopRing(), el("div", {}, "Loop alive", el("small", {text:`last increment ${age} ago`}))
  ));
}

function loopRing(){
  const svg = el("svg", {class:"loopring", viewBox:"0 0 18 18", "aria-hidden":"true"});
  svg.innerHTML = '<circle class="trk" cx="9" cy="9" r="7"></circle><circle class="arc" cx="9" cy="9" r="7"></circle>';
  return svg;
}

function freshnessLabel(value){
  const t = Date.parse(value || "");
  if(!Number.isFinite(t)) return "";
  const seconds = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if(seconds < 60) return "0m";
  const minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `${minutes}m`;
  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h`;
  return `${Math.floor(hours / 24)}d`;
}

function livePill(){
  if(shellState.loopLive !== true) return null;
  return el("span", {class:"live"}, el("i", {"aria-hidden":"true"}), "Loop live");
}

function updateShellSignals(data){
  const stamp = firstTimestamp(data, ["last_increment_at","last_increment","latest_increment_at","updated_at"]);
  if(stamp) shellState.lastIncrementAt = stamp;
  if(data && (data.loop_live === true || data.live === true || data.running === true)) shellState.loopLive = true;
  renderShellChrome();
}

function firstTimestamp(data, keys){
  if(!data || typeof data !== "object") return "";
  for(const key of keys){
    if(typeof data[key] === "string" && Number.isFinite(Date.parse(data[key]))) return data[key];
  }
  for(const value of Object.values(data)){
    if(value && typeof value === "object"){
      const found = firstTimestamp(value, keys);
      if(found) return found;
    }
  }
  return "";
}

function loadStoredCreated(){
  const raw = getStored(CREATED_KEY);
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(_){ return null; }
}

function setNeedsBadge(count){
  shellState.needsCount = Number(count) || 0;
  renderShellChrome();
  const badge = document.getElementById("needs-badge");
  if(!badge) return;
  const n = shellState.needsCount;
  badge.textContent = String(n);
  badge.setAttribute("data-count", String(n));
  badge.setAttribute("aria-label", `${n} pending item${n===1?"":"s"}`);
}

async function load(){
  renderPortfolioShell();
  const grid = document.getElementById("grid");
  const state = document.getElementById("state");
  try{
    const res = await authFetch("/api/portfolio");
    if(res.status === 401 || res.status === 403){ stopBuildPolling(); setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    updateShellSignals(d);
    document.getElementById("portfolio-sub").textContent =
      `${d.count} program${d.count===1?"":"s"} · assurance: ${d.assurance_source}`;
    grid.innerHTML = "";
    const created = draftState.created || loadStoredCreated();
    if(created) grid.appendChild(createdProgramCard(created));
    (d.programs || []).forEach(p => grid.appendChild(card(p)));
    state.textContent = d.count || created ? "" : "No programs yet.";
  }catch(e){
    state.className = "state err"; state.textContent = "Could not load portfolio: " + e.message;
  }
}

function renderPortfolioShell(){
  document.body.dataset.route = "portfolio";
  app().className = "";
  app().innerHTML = "";
  const title = el("div", {class:"toolbar"},
    el("div", {}, el("h1", {text:"Portfolio"}), el("p", {class:"sub", id:"portfolio-sub", text:"Loading programs…"})),
    el("span", {class:"spacer"}),
    el("a", {class:"new-idea", href:"#/new", "aria-label":"New idea", text:"＋ New idea"})
  );
  app().append(title, el("div", {class:"grid", id:"grid"}), el("div", {class:"state", id:"state", role:"status"}));
}

async function renderNeeds(){
  document.body.dataset.route = "needs";
  app().className = "screen-needs";
  needsState = Object.assign(needsState, {loading:true, error:""});
  renderNeedsShell();
  try{
    const res = await authFetch("/api/needs-you");
    if(res.status === 401 || res.status === 403){ stopBuildPolling(); setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    applyNeedsData(await res.json());
  }catch(e){
    needsState.error = "Could not load Needs You: " + e.message;
    needsState.loading = false;
    renderNeedsShell();
  }
}

function applyNeedsData(data){
  needsState = Object.assign(needsState, {
    items:Array.isArray(data.items) ? data.items : [],
    count:Number(data.count) || 0,
    source:data.source || "",
    degraded:Array.isArray(data.degraded) ? data.degraded : [],
    loading:false,
    error:"",
    openId:"",
    decision:"",
    resolving:false,
    note:""
  });
  setNeedsBadge(needsState.count);
  renderNeedsShell();
}

function renderNeedsShell(){
  app().innerHTML = "";
  const shell = el("section", {class:"needs-shell", "data-primary-object":"needs-list"},
    el("a", {class:"back", href:"#/", text:"← Portfolio"}),
    el("div", {class:"vhead"},
      el("div", {},
        el("h1", {text:"Needs you"}),
        el("p", {text:"Everything across your programs that needs a human decision, in the order the loop returned it."})
      ),
      needsState.count > 0 ? el("span", {class:"needs-count", "aria-label":`${needsState.count} waiting`}, el("b", {text:String(needsState.count)}), "waiting") : null
    ),
    el("div", {class:"needs-lede micro", text:"The loop suggests — you decide. Resolve one in a couple of taps; nothing else competes for your attention."})
  );
  const list = el("div", {class:"needs-list", id:"needs-list"});
  if(needsState.loading){
    list.appendChild(el("div", {class:"state", role:"status", text:"Loading what needs you…"}));
  }else if(needsState.error){
    list.appendChild(el("div", {class:"state err", role:"alert", text:needsState.error}));
  }else if(needsState.count === 0 && needsState.degraded.length){
    list.appendChild(renderNeedsDegraded());
  }else if(needsState.count === 0){
    list.appendChild(el("div", {class:"empty-state", role:"status"},
      el("div", {class:"ering", "aria-hidden":"true", text:"✓"}),
      el("div", {class:"big", text:"Nothing needs you right now"}),
      el("div", {class:"small", text:"The loop has nothing awaiting a human because the BFF returned a clean zero."})
    ));
  }else{
    const rows = needsState.items.slice(0, NEEDS_ITEM_CAP);
    rows.forEach(item => list.appendChild(renderNeedsItem(item)));
    const total = Math.max(needsState.count, needsState.items.length);
    if(total > rows.length){
      list.appendChild(el("div", {class:"needs-truncated", role:"status", text:`Showing ${rows.length} of ${total} needs returned.`}));
    }
  }
  shell.appendChild(list);
  app().appendChild(shell);
}

function renderNeedsDegraded(){
  const sources = needsState.degraded.map(s => String(s || "unknown source"));
  return el("div", {class:"datafail needs-datafail", role:"status"},
    el("div", {class:"micro"}, el("span", {class:"pip", "aria-hidden":"true", text:"!"}), "couldn't read Needs You"),
    el("p", {}, "A source didn't answer — this isn't a confirmed clear queue, just what the console could reach."),
    el("p", {}, "source", sources.length === 1 ? "" : "s", ": ",
      sources.map((source, i) => [i ? ", " : "", el("code", {text:source})])
    )
  );
}

function renderNeedsItem(item){
  const open = needsState.openId === item.id;
  const actionable = item.actionable !== false;
  const box = el("article", {class:"needs-item", "data-needs-id":item.id || "", "data-kind":item.kind || "", "aria-expanded":open});
  box.appendChild(el("div", {class:"needs-meta"},
    el("span", {class:"program-pill", text:item.program || "Program"}),
    el("span", {class:"kind-tag " + kindClass(item.kind), text:kindLabel(item.kind)}),
    el("span", {class:"needs-age", text:ageFrom(item.created_at)})
  ));
  box.appendChild(el("div", {class:"needs-ask", text:item.ask || ""}));
  if(item.kind === "signoff"){
    box.appendChild(item.assurance === null ? noAssuranceStrip() : trustStrip(item.assurance || {}));
  }
  if(open) box.appendChild(renderResolveBox(item));
  else box.appendChild(el("div", {class:"actions"},
    el("button", {class:"btn needs-action", type:"button", disabled:needsState.resolving || !actionable, onclick:()=>openNeedsItem(item.id), text:primaryActionLabel(item.kind)})
  ));
  return box;
}

function noAssuranceStrip(){
  return el("div", {class:"assurance-empty", "data-assurance":"none"},
    el("span", {class:"hatch", "aria-hidden":"true"}),
    el("span", {text:"no assurance data yet"})
  );
}

function openNeedsItem(id){
  needsState.openId = id;
  needsState.decision = "";
  needsState.resolving = false;
  needsState.note = "";
  renderNeedsShell();
}

function actionSet(kind){
  if(kind === "signoff") return [
    {label:"Accept", decision:"accept"},
    {label:"Request changes", decision:"request_changes", danger:true}
  ];
  if(kind === "steer") return [{label:"Accept", decision:"accept"}];
  return [];
}

function renderResolveBox(item){
  const actions = actionSet(item.kind);
  const selected = needsState.decision;
  const noteId = "needs-note-" + String(item.id || "").replace(/[^a-z0-9_-]/gi, "-");
  const box = el("div", {class:"resolve-box", role:"group", "aria-label":"Resolve item"},
    el("div", {class:"tapcount", text:"Tap 1 open · Tap 2 decide · Tap 3 confirm"})
  );
  if(actions.length){
    box.appendChild(el("div", {class:"decision-row"},
      actions.map(a => el("button", {
        class:"btn decision-option " + (a.danger ? "blocked" : "two-key"),
        type:"button",
        "data-decision":a.decision,
        "aria-pressed":selected === a.decision,
        disabled:needsState.resolving,
        onclick:()=>selectNeedsDecision(a.decision),
        text:a.label
      }))
    ));
    box.appendChild(el("label", {class:"field", for:noteId, text:"Note (optional)"}));
    box.appendChild(el("textarea", {
      class:"resolve-note",
      id:noteId,
      placeholder:"Optional note",
      disabled:needsState.resolving,
      oninput:ev=>{ needsState.note = ev.currentTarget.value; }
    }));
    const textarea = box.querySelector("textarea");
    if(textarea) textarea.value = needsState.note || "";
    box.appendChild(el("div", {class:"actions"},
      el("button", {
        class:"btn needs-action",
        type:"button",
        id:"needs-confirm",
        disabled:needsState.resolving || !selected,
        onclick:()=>confirmNeedsResolve(item),
        text:needsState.resolving ? "Confirming…" : "Confirm"
      }),
      el("button", {class:"btn ghost needs-action", type:"button", disabled:needsState.resolving, onclick:()=>openNeedsItem(""), text:"Cancel"})
    ));
  }else{
    box.appendChild(el("div", {class:"note", text:"This item type is not resolvable from this client yet."}));
  }
  if(needsState.error) box.appendChild(el("div", {class:"err", role:"alert", text:needsState.error}));
  return box;
}

function selectNeedsDecision(decision){
  if(needsState.resolving) return;
  if(decision !== "accept" && decision !== "request_changes") return;
  needsState.decision = decision;
  renderNeedsShell();
}

async function confirmNeedsResolve(item){
  if(needsState.resolving || !needsState.decision) return;
  needsState.resolving = true;
  needsState.error = "";
  renderNeedsShell();
  const body = {decision:needsState.decision};
  if((needsState.note || "").trim()) body.note = needsState.note.trim();
  try{
    const res = await authFetch(`/api/needs-you/${item.id}/resolve`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(res.status === 401 || res.status === 403){ setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    applyNeedsData(await res.json());
  }catch(e){
    needsState.resolving = false;
    needsState.error = "Could not resolve this item: " + e.message;
    renderNeedsShell();
  }
}

function kindClass(kind){
  if(kind === "signoff" || kind === "two_key" || kind === "two-key") return "two-key";
  if(kind === "clarify" || kind === "one_key" || kind === "one-key") return "one-key";
  if(kind === "prioritize" || kind === "vacuous") return "vacuous";
  if(kind === "steer" || kind === "blocked") return "blocked";
  return "unknown";
}

function kindLabel(kind){
  if(kind === "signoff") return "sign-off";
  if(kind === "clarify") return "clarify";
  if(kind === "prioritize") return "prioritize";
  if(kind === "steer") return "steer";
  if(kind === "two_key" || kind === "two-key") return "two-key";
  if(kind === "one_key" || kind === "one-key") return "one-key";
  if(kind === "vacuous") return "vacuous";
  if(kind === "blocked") return "blocked";
  return "item";
}

function primaryActionLabel(kind){
  if(kind === "signoff") return "Review";
  if(kind === "clarify") return "Answer";
  if(kind === "prioritize") return "Choose";
  if(kind === "steer") return "Review";
  return "Open";
}

function ageFrom(value){
  const t = Date.parse(value || "");
  if(!Number.isFinite(t)) return "age unknown";
  const seconds = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if(seconds < 60) return "just now";
  const minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  if(days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  if(months < 12) return `${months}mo ago`;
  return `${Math.floor(months / 12)}y ago`;
}

function createdProgramCard(p){
  const code = p.code || p.program_id || "";
  const c = el("a", {class:"card", href:code ? "#program/" + encodeURIComponent(code) + "/build" : "#/", "aria-label":"Created program"});
  c.style.textDecoration = "none";
  const row = el("div", {class:"row"},
    el("span", {class:"code", text:code || "NEW"}),
    el("span", {class:"stage", text:"created"})
  );
  const idea = el("div", {class:"idea", text:"Created program"});
  const grade = p.grade == null ? "" : `Re-graded: ${formatGrade(p.grade)}`;
  const live = el("span", {class:"card-action", role:"link", tabindex:"0", "data-living-open":code, text:"Living / open"});
  live.addEventListener("click", ev => {
    ev.preventDefault();
    ev.stopPropagation();
    location.hash = "#program/" + encodeURIComponent(code) + "/living";
  });
  live.addEventListener("keydown", ev => {
    if(ev.key === "Enter" || ev.key === " "){
      ev.preventDefault();
      ev.stopPropagation();
      location.hash = "#program/" + encodeURIComponent(code) + "/living";
    }
  });
  c.append(row, idea, el("div", {class:"cap", text:grade || "Program created"}), el("div", {class:"card-actions"}, live));
  return c;
}

  app().className = "screen-new";
  app().innerHTML = "";
  draftState.created = draftState.created || loadStoredCreated();
  const inputId = "idea-input";
  const form = el("form", {class:"ideaframe", id:"idea-form", "data-primary-object":"idea-input", onsubmit:onDraftSubmit},
    el("div", {class:"ideabox"},
      el("label", {class:"field", for:inputId, text:"Your idea"}),
      el("textarea", {
        id:inputId, class:"idea-input", name:"idea", rows:"5", required:true, maxlength:"20000",
        placeholder:"e.g. A local-first habit tracker that never nags — it just quietly shows the streak you've earned."
      }),
      el("div", {class:"row"},
        el("button", {class:"btn", id:"shape-submit", type:"submit", disabled:draftState.inFlight, text:draftState.inFlight ? "Shaping…" : "Shape it into a Vision"}),
        el("span", {class:"note", text:"~2–4 min · the council drafts & grades it live"})
      ),
      el("div", {class:"validation", id:"idea-validation", role:"alert", text:draftState.error && !draftState.timedOut ? draftState.error : ""})
    )
  );
  const vhead = el("div", {class:"vhead"},
    el("div", {},
      el("h1", {text:"Idea → Vision"}),
      el("p", {text:"Where it begins: say the thing you want to exist. The Foundation shapes it into a Vision and grades it honestly — you'll see whether it's ready, or exactly what's missing."})
    ),
    livePill()
  );
  const hero = el("div", {class:"hero"},
    el("h2", {html:"Every program here began as a <em>sentence like yours</em>."}),
    el("p", {text:"You bring the idea and the judgment. The loop brings the hands. Type one sentence — the console will draft a Vision and grade it against the council's gate."}),
    el("div", {class:"covenant"}, el("b", {text:"Nothing builds until you say so."}), " The loop suggests — you decide.")
  );
  const sampleBox = el("div", {class:"samples"},
    el("span", {class:"samples-h", text:"or start from a sample"}),
    samples.map(sample => el("button", {class:"schip", type:"button", "data-sample-idea":sample, onclick:onSampleClick, text:sample}))
  );
  app().append(
    vhead,
    el("div", {class:"door-col"},
    hero,
    form,
    sampleBox,
    el("section", {class:"panel", id:"vision-panel"})
    )
  );
  const idea = document.getElementById(inputId);
  idea.value = draftState.idea || getStored(IDEA_KEY);

function onSampleClick(ev){
  const sample = ev.currentTarget.getAttribute("data-sample-idea") || "";
  const input = document.getElementById("idea-input");
  input.value = sample;
  draftState.idea = sample;
  document.getElementById("idea-validation").textContent = "";
  input.focus();
}

async function onDraftSubmit(ev){
  ev.preventDefault();
  const input = document.getElementById("idea-input");
  const idea = (input.value || "").trim();
  if(!idea){
    draftState.error = "Enter an idea before shaping it.";
    draftState.timedOut = false;
    renderNew();
    document.getElementById("idea-input").focus();
    return;
  }
  await submitDraft(idea);
}

async function submitDraft(idea){
  draftState = Object.assign(draftState, {idea, vision:null, inFlight:true, error:"", timedOut:false, startOpen:false, created:null});
  setStored(IDEA_KEY, idea);
  renderNew();
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), DRAFT_TIMEOUT_MS);
  try{
    const res = await authFetch("/api/vision/draft", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({idea}),
      signal:controller.signal
    });
    if(res.status === 401 || res.status === 403){ setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    draftState.vision = await res.json();
    draftState.error = "";
  }catch(e){
    draftState.error = e.name === "AbortError" ? "The shaping request timed out. Retry when you are ready." : "Could not shape this idea: " + e.message;
    draftState.timedOut = e.name === "AbortError";
  }finally{
    clearTimeout(timer);
    draftState.inFlight = false;
    renderNew();
  }
}

function renderVisionPanel(){
  const panel = document.getElementById("vision-panel");
  if(!panel) return;
  panel.innerHTML = "";
  if(draftState.inFlight){
    panel.appendChild(el("div", {class:"shaping", role:"status"},
      el("span", {class:"dot", "aria-hidden":"true"}), "Shaping your idea into a Vision, then grading it against the council's gate…"
    ));
    return;
  }
  if(draftState.timedOut){
    panel.appendChild(el("div", {class:"vision"},
      el("div", {class:"err", role:"alert", text:draftState.error}),
      el("div", {class:"actions"}, el("button", {class:"btn", type:"button", onclick:()=>submitDraft(draftState.idea), text:"Retry shaping"}))
    ));
    return;
  }
  if(draftState.error){
    panel.appendChild(el("div", {class:"state err", role:"alert", text:draftState.error}));
    return;
  }
  if(draftState.vision) panel.appendChild(renderVision(draftState.vision));
}

function validVision(v){
  return v && typeof v === "object" && typeof v.statement === "string" && Array.isArray(v.epics) &&
    typeof v.grade === "number" && v.gate && typeof v.gate === "object" && typeof v.gate.threshold === "number";
}

function renderVision(v){
  if(isDraftReadUnavailable(v)) return renderDataFail(v);
  if(!validVision(v)){
    return renderDataFail(Object.assign({source:"vision-gate"}, v || {}));
  }
  const container = el("div", {class:"vision"});
  container.appendChild(el("div", {class:"vquote", text:`Born from: “${draftState.idea || v.idea_reason || v.idea || ""}”`}));
  container.appendChild(el("div", {class:"statement", text:v.statement}));
  const epics = el("div", {class:"epics"});
  let renderedStories = 0;
  let truncated = false;
  (v.epics || []).forEach((epic, i) => {
    const title = typeof epic === "string" ? epic : (epic.title || epic.name || `Epic ${i + 1}`);
    const stories = Array.isArray(epic.stories) ? epic.stories : [];
    const ul = el("ul", {});
    stories.forEach(story => {
      if(renderedStories >= STORY_CAP){ truncated = true; return; }
      renderedStories += 1;
      ul.appendChild(el("li", {text:storyText(story)}));
    });
    epics.appendChild(el("div", {class:"epic"}, el("h3", {text:title}), ul));
  });
  if(truncated){
    console.warn(`Vision response exceeded ${STORY_CAP} stories; rendering was truncated.`);
    epics.appendChild(el("div", {class:"note", text:`Showing the first ${STORY_CAP} stories from the drafted Vision.`}));
  }
  container.appendChild(epics);
  container.appendChild(renderGrade(v));
  const ready = v.grade >= v.gate.threshold;
  if(ready) container.appendChild(renderStartFlow(v));
  else container.appendChild(el("div", {class:"actions"}, el("button", {class:"btn locked", type:"button", disabled:true, text:"Start — locked until it clears"})));
  return container;
}

function isDraftReadUnavailable(v){
  if(!v || typeof v !== "object") return true;
  return v.degraded === true || v.failed === true || v.partial === true || ["degraded","failed","partial"].includes(String(v.status_class || "").toLowerCase());
}

function renderDataFail(v){
  const source = dataFailSource(v);
  console.warn("vision draft honest-abstain: source unavailable", source);
  return el("div", {class:"datafail", role:"status"},
    el("div", {class:"micro"}, el("span", {class:"pip", "aria-hidden":"true", text:"!"}), `couldn't read ${source}`),
    el("p", {}, "A source didn't answer — this isn't a confirmed clear/idle, just what the console could reach."),
    el("p", {}, "source: ", el("code", {text:source}))
  );
}

function dataFailSource(v){
  if(v && typeof v.source === "string" && v.source) return v.source;
  if(v && Array.isArray(v.degraded) && v.degraded.length) return v.degraded.join(", ");
  if(v && typeof v.status_class === "string" && v.status_class) return v.status_class;
  return "vision-gate";
}

function storyText(story){
  if(story && typeof story === "object") return String(story.title || story.name || story.issue || "");
  return String(story || "");
}

function formatGrade(g){
  return typeof g === "number" && Number.isFinite(g) ? g.toFixed(2) : String(g ?? "—");
}

function renderGrade(v){
  const threshold = v.gate.threshold;
  const ready = v.grade >= threshold;
  const grade = formatGrade(v.grade);
  const floor = formatGrade(threshold);
  const gradePct = Math.max(0, Math.min(100, v.grade * 100));
  const floorPct = Math.max(0, Math.min(100, threshold * 100));
  const box = el("div", {class:"vgrade " + (ready ? "ready" : "notready"), role:"status", "aria-label":`Vision grade ${grade} — ${ready ? "ready" : "not ready"}`},
    el("div", {class:"gtop"},
      el("span", {class:"gnum", text:grade}),
      el("span", {class:"gmeta"},
        el("span", {class:"gverdict", text:ready ? "Ready to start" : "Not ready yet"}),
        el("span", {class:"gmeasured", text:`computed by the vision-gate · ${ready ? "eligible · ≥" : "below the"} ${floor} floor`})
      )
    ),
    el("div", {class:"gmeter"},
      el("span", {class:"trk"}),
      el("span", {class:"fill", style:`width:${gradePct}%`}),
      el("span", {class:"notch", style:`left:${floorPct}%`})
    )
  );
  if(!ready){
    const findings = el("ul", {class:"findings"});
    (v.gate.findings || []).forEach(f => {
      findings.appendChild(el("li", {class:"finding"},
        el("span", {class:"sev " + String(f.severity || "info").toLowerCase(), text:String(f.severity || "info")}),
        el("span", {text:String(f.issue || "")})
      ));
    });
    return el("div", {}, box, el("p", {class:"findings-h", text:"What the gate found missing — graded down, not glossed over"}), findings);
  }
  return box;
}

function renderStartFlow(v){
  const wrap = el("div", {class:"actions"});
  wrap.appendChild(el("button", {class:"btn approve", type:"button", id:"start-program", onclick:()=>{ draftState.startOpen = true; renderNew(); }, text:"Looks right — start building it"}));
  if(!draftState.startOpen) return wrap;
  const confirm = el("div", {class:"confirm", role:"dialog", "aria-label":"Confirm program start"},
    el("div", {class:"note", text:"Confirm program creation from this drafted Vision."}),
    el("div", {class:"actions"},
      el("button", {class:"btn", type:"button", id:"confirm-start", disabled:draftState.starting, onclick:()=>startProgram(v), text:draftState.starting ? "Starting…" : "Confirm start"}),
      el("button", {class:"btn ghost", type:"button", disabled:draftState.starting, onclick:()=>{ draftState.startOpen = false; renderNew(); }, text:"Cancel"})
    )
  );
  wrap.appendChild(confirm);
  if(draftState.created){
    wrap.appendChild(el("div", {class:"success", role:"status"},
      el("a", {href:"#/", text:`Program ${draftState.created.code || draftState.created.program_id || ""} created`}),
      ` · Re-graded ${formatGrade(draftState.created.grade)}`
    ));
  }
  return wrap;
}

async function startProgram(vision){
  if(draftState.starting) return;
  draftState.starting = true;
  renderNew();
  const body = {name:programName(vision, draftState.idea), idea:draftState.idea, vision};
  try{
    const res = await authFetch("/api/programs", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    draftState.created = await res.json();
    setStored(CREATED_KEY, JSON.stringify(draftState.created));
  }catch(e){
    draftState.error = "Could not start this program: " + e.message;
  }finally{
    draftState.starting = false;
    renderNew();
  }
}

function programName(vision, idea){
  const seed = (vision.statement || idea || "New Program").split(/[.!?]/)[0].trim();
  return seed.slice(0, 80) || "New Program";
}

function buildRouteCode(){
  const hashMatch = location.hash.match(/^#\/?program\/([^/]+)\/build$/);
  const pathMatch = location.pathname.match(/^\/program\/([^/]+)\/build$/);
  const raw = hashMatch ? hashMatch[1] : (pathMatch ? pathMatch[1] : "");
  return raw ? decodeURIComponent(raw) : "";
}

function livingRouteCode(){
  const hashMatch = location.hash.match(/^#\/?program\/([^/]+)\/living$/);
  const pathMatch = location.pathname.match(/^\/program\/([^/]+)\/living$/);
  const raw = hashMatch ? hashMatch[1] : (pathMatch ? pathMatch[1] : "");
  return raw ? decodeURIComponent(raw) : "";
}

function stopBuildPolling(){
  if(buildState.poll) clearInterval(buildState.poll);
  if(buildState.controller) buildState.controller.abort();
  buildState.poll = null;
  buildState.controller = null;
  buildState.seq += 1;
}

function stopLivingPolling(){
  if(livingState.controller) livingState.controller.abort();
  livingState.controller = null;
  livingState.seq += 1;
}

function renderBuild(code){
  if(buildState.program === code && buildState.poll) return;
  stopBuildPolling();
  buildState = {program:code, data:null, loading:true, error:"", poll:null, controller:null, seq:buildState.seq};
  document.body.dataset.route = "build";
  app().className = "screen-build";
  renderShellChrome();
  renderBuildShell();
  fetchBuild(code);
  buildState.poll = setInterval(() => fetchBuild(code), BUILD_POLL_MS);
}

async function fetchBuild(code){
  if(buildState.controller) buildState.controller.abort();
  const controller = new AbortController();
  const seq = buildState.seq + 1;
  buildState.seq = seq;
  buildState.controller = controller;
  buildState.loading = !buildState.data;
  buildState.error = "";
  renderBuildShell();
  try{
    const res = await authFetch(`/api/programs/${encodeURIComponent(code)}/build`, {signal:controller.signal});
    if(res.status === 401 || res.status === 403){ stopBuildPolling(); setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if(seq !== buildState.seq || buildState.program !== code) return;
    buildState.data = data && typeof data === "object" ? data : {};
    updateShellSignals(buildState.data);
    buildState.error = "";
  }catch(e){
    if(e.name === "AbortError") return;
    if(seq !== buildState.seq || buildState.program !== code) return;
    buildState.error = "Could not load build state: " + e.message;
  }finally{
    if(seq === buildState.seq && buildState.program === code){
      buildState.loading = false;
      if(buildState.controller === controller) buildState.controller = null;
      renderBuildShell();
    }
  }
}

function renderBuildShell(){
  app().innerHTML = "";
  const code = buildState.program || "Program";
  const data = buildState.data || {};
  const shell = el("section", {class:"build-shell", "data-primary-object":"build-tree"},
    el("a", {class:"back", href:"#/", text:"← Portfolio"}),
    el("div", {class:"toolbar"},
      el("div", {},
        el("h1", {text:"Build Monitor"}),
        el("p", {class:"sub", text:`${data.program || code} live forge state from the Build BFF.`})
      )
    )
  );
  if(buildState.error){
    shell.appendChild(el("div", {class:"build-error", role:"alert", text:buildState.error}));
    if(!buildState.data){
      app().appendChild(shell);
      return;
    }
  }
  if(buildState.loading && !buildState.data){
    shell.appendChild(el("div", {class:"state", role:"status", text:"Loading build state…"}));
    app().appendChild(shell);
    return;
  }
  if(isBuildDegraded(data)){
    shell.append(renderBuildDegraded(), renderBuildFeed(data.feed || []));
    app().appendChild(shell);
    return;
  }
  const layout = el("div", {class:"build-layout"});
  const builds = el("div", {class:"builds", id:"build-tree"});
  const stalled = Array.isArray(data.stalled) ? data.stalled : [];
  if(stalled.length) builds.appendChild(renderStalls(stalled));
  const specs = Array.isArray(data.specs) ? data.specs : [];
  if(data.idle === true && data.idle_reason === "genuine" && !stalled.length){
    builds.appendChild(renderBuildIdle());
  }else if(specs.length){
    specs.forEach(spec => builds.appendChild(renderBuildSpec(spec)));
  }else if(!buildState.error){
    builds.appendChild(el("div", {class:"build-empty", role:"status", text:"No active specs were returned for this build read."}));
  }
  layout.append(builds, renderBuildFeed(data.feed || []));
  shell.appendChild(layout);
  app().appendChild(shell);
}

function isBuildDegraded(data){
  const degraded = Array.isArray(data.degraded) ? data.degraded : [];
  return data.idle === true && data.idle_reason !== "genuine" || data.idle_reason === "unknown" || degraded.includes("specs");
}

function renderBuildDegraded(){
  return el("div", {class:"build-error", role:"alert"},
    el("strong", {text:"Couldn't read build state"}),
    el("div", {text:"The specs read was unavailable or malformed, so this is not shown as idle."})
  );
}

function renderBuildIdle(){
  return el("div", {class:"idle", role:"status"},
    el("div", {class:"big", text:"Idle — no active build"}),
    el("div", {class:"small", text:"This program has no specs in flight right now."})
  );
}

function renderBuildSpec(spec){
  const classes = ["spec"];
  if(spec.has_failure) classes.push("has-failure");
  if(spec.has_unknown) classes.push("has-unknown");
  const box = el("article", {class:classes.join(" "), "data-spec-id":spec.id || ""});
  const head = el("div", {class:"spec-head"},
    el("span", {class:"spec-id", text:String(spec.id ?? "spec")}),
    el("span", {class:"spec-title", text:spec.title || "Untitled spec"}),
    el("span", {class:"spec-status", text:spec.status || "status unknown"})
  );
  if(spec.has_failure) head.appendChild(el("span", {class:"spec-badge failure", text:"failure"}));
  if(spec.has_unknown) head.appendChild(el("span", {class:"spec-badge unknown", text:"unknown"}));
  box.appendChild(head);
  if(spec.phases_unavailable === true){
    box.appendChild(el("div", {class:"phase-unavailable", role:"status", text:"phases unavailable"}));
    return box;
  }
  const scroll = el("div", {class:"phases-scroll"});
  const phases = el("div", {class:"phases"});
  (Array.isArray(spec.phases) ? spec.phases : []).forEach(phase => phases.appendChild(renderBuildPhase(phase)));
  if(!phases.children.length) phases.appendChild(el("div", {class:"build-empty", text:"No phase rows returned."}));
  scroll.appendChild(phases);
  box.appendChild(scroll);
  return box;
}

function renderBuildPhase(phase){
  const cls = phaseClass(phase);
  return el("div", {class:"phase " + cls},
    el("span", {class:"seq", text:String(phase.seq ?? "–")}),
    el("span", {class:"phase-main"},
      el("span", {class:"phase-title", text:phase.title || phase.type || "phase"}),
      el("span", {class:"phase-meta", text:[phase.type, phase.provider].filter(Boolean).join(" · ") || "provider unknown"})
    ),
    el("span", {class:"gate-chip " + cls, text:phase.status || "status unknown"})
  );
}

function phaseClass(phase){
  if(phase.failing === true || phase.status_class === "failing") return "failing";
  if(phase.status_class === "unknown") return "unknown";
  return "ok";
}

function renderBuildFeed(feed){
  const aside = el("aside", {class:"feed", "aria-label":"Loop activity"},
    el("h2", {text:"Loop activity"})
  );
  const list = el("div", {class:"feed-list"});
  const rows = (Array.isArray(feed) ? feed : []).slice(0, BUILD_FEED_CAP);
  if(!rows.length){
    list.appendChild(el("div", {class:"build-empty", text:"No feed events returned."}));
  }else{
    rows.forEach(item => list.appendChild(el("div", {class:"ev"},
      el("span", {class:"ts", text:formatBuildTime(item.ts)}),
      el("span", {},
        el("span", {class:"who", text:item.actor || "loop"}),
        " ",
        item.spec_id ? `#${item.spec_id} ` : "",
        item.event || ""
      )
    )));
  }
  aside.appendChild(list);
  return aside;
}

function renderStalls(stalled){
  const box = el("section", {class:"stall", "aria-label":"Stalled builds"},
    el("h2", {text:"Stalled"})
  );
  const list = el("div", {class:"stall-list"});
  stalled.forEach(item => list.appendChild(el("div", {class:"stall-item"},
    el("div", {class:"stall-title", text:item.title || `Spec ${item.spec_id || ""}`.trim()}),
    el("div", {class:"stall-meta", text:[item.stall_class, item.since].filter(Boolean).join(" · ")}),
    el("div", {class:"stall-blocker", text:"Blocked: " + (item.blocker || "blocker unknown")}),
    el("div", {class:"stall-action", text:"Recommended: " + (item.recommended_action || "action unknown")})
  )));
  box.appendChild(list);
  return box;
}

function formatBuildTime(value){
  if(!value) return "now";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function renderLiving(code){
  if(livingState.program === code && (livingState.loading || livingState.data)) return;
  stopLivingPolling();
  livingState = {program:code, data:null, loading:true, error:"", controller:null, seq:livingState.seq};
  document.body.dataset.route = "living";
  app().className = "screen-living";
  renderShellChrome();
  renderLivingShell();
  fetchLiving(code);
}

async function fetchLiving(code){
  if(livingState.controller) livingState.controller.abort();
  const controller = new AbortController();
  const seq = livingState.seq + 1;
  livingState.seq = seq;
  livingState.controller = controller;
  livingState.loading = !livingState.data;
  livingState.error = "";
  renderLivingShell();
  try{
    let res = await authFetch(`/api/programs/${encodeURIComponent(code)}/living`, {signal:controller.signal});
    if(res.status === 401 || res.status === 403){ stopLivingPolling(); setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok && res.status >= 500){
      res = await authFetch(`/api/programs/${encodeURIComponent(code)}/living`, {signal:controller.signal});
    }
    if(res.status === 401 || res.status === 403){ stopLivingPolling(); setToken(""); showSignIn(res.status===403?"That account is not authorized.":""); return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if(seq !== livingState.seq || livingState.program !== code) return;
    livingState.data = data && typeof data === "object" ? data : {};
    updateShellSignals(livingState.data);
    livingState.error = "";
  }catch(e){
    if(e.name === "AbortError") return;
    if(seq !== livingState.seq || livingState.program !== code) return;
    livingState.error = "Could not load living program: " + e.message;
  }finally{
    if(seq === livingState.seq && livingState.program === code){
      livingState.loading = false;
      if(livingState.controller === controller) livingState.controller = null;
      renderLivingShell();
    }
  }
}

function renderLivingShell(){
  app().innerHTML = "";
  const code = livingState.program || "Program";
  const data = livingState.data || {};
  const shell = el("section", {class:"living-shell"},
    el("a", {class:"back", href:"#/", text:"← Portfolio"}),
    el("p", {class:"living-born"},
      "Born from your sentence: ",
      el("b", {text:data.idea_sentence || "waiting for the program sentence"})
    ),
    el("div", {class:"toolbar"},
      el("div", {},
        el("h1", {text:data.name ? `${data.name} is ${data.running === false ? "not live yet" : "living"}` : "Living Program"}),
        el("p", {class:"sub", text:`${data.program || code} live read from the Living BFF.`})
      )
    )
  );
  if(livingState.error){
    shell.appendChild(el("div", {class:"living-error", role:"alert", text:livingState.error}));
    if(!livingState.data){
      app().appendChild(shell);
      return;
    }
  }
  if(livingState.loading && !livingState.data){
    shell.appendChild(el("div", {class:"state", role:"status", text:"Loading living program…"}));
    app().appendChild(shell);
    return;
  }
  shell.appendChild(renderLivingRunning(data));
  if(data.running === true){
    const features = renderLivingFeatures(data);
    if(features) shell.appendChild(features);
    const recap = renderLivingRecap(data.recap || {}, data);
    if(recap) shell.appendChild(recap);
  }
  app().appendChild(shell);
}

function renderLivingRunning(data){
  if(data.running !== true){
    return el("section", {class:"notlive", "data-primary-object":"living-app", role:"status"},
      el("div", {class:"big", text:"Not live yet"}),
      el("div", {class:"small", text:"This program has no running application URL from the Living BFF yet. When it ships, its address appears here."})
    );
  }
  const top = el("div", {class:"living-top"},
    el("span", {class:"running-status", text:"Running"}),
    data.url ? el("span", {class:"living-url", text:data.url}) : null
  );
  if(data.url){
    top.appendChild(el("a", {class:"open-it", href:data.url, target:"_blank", rel:"noopener", text:"Open it"}));
  }
  return el("section", {class:"living-window", "data-primary-object":"living-app"},
    top,
    el("div", {class:"vitals"},
      el("div", {class:"vital"}, el("div", {class:"k", text:"Health"}), el("div", {class:"v", text:String(data.health ?? "health unavailable")})),
      el("div", {class:"vital"}, el("div", {class:"k", text:"Version"}), el("div", {class:"v", text:String(data.version ?? "version unavailable")}))
    )
  );
}

function renderLivingFeatures(data){
  const all = Array.isArray(data.features) ? data.features : [];
  if(!all.length) return null;
  const rows = all.slice(0, LIVING_FEATURE_CAP);
  const section = el("section", {class:"living-block", "aria-label":"Delivered features"},
    el("h2", {text:"What it delivers"})
  );
  if(data.features_trust_strip) section.appendChild(trustStrip(data.features_trust_strip));
  const list = el("div", {class:"living-features"});
  rows.forEach(feature => list.appendChild(el("article", {class:"living-feature"},
    el("div", {class:"feature-name", text:feature.name || "Delivered feature"}),
    el("div", {class:"feature-increment", text:feature.increment == null ? "increment unknown" : "from increment " + feature.increment}),
    el("div", {class:"feature-assurance"}, trustStrip(featureAssuranceStrip(feature.assurance)))
  )));
  section.appendChild(list);
  if(all.length > LIVING_FEATURE_CAP){
    section.appendChild(el("div", {class:"living-truncated", role:"status", text:`Showing the first ${LIVING_FEATURE_CAP} delivered features from ${all.length} returned.`}));
  }
  return section;
}

function featureAssuranceStrip(assurance){
  const state = String(assurance || "unknown");
  if(!assurance) return {total:0, counts:{}, caption:"no assurance data yet"};
  const counts = {};
  counts[state] = 1;
  return {total:1, counts, caption:state.replace(/_/g, "-")};
}

function renderLivingRecap(recap, data){
  const steps = [];
  if(recap && recap.idea_date) steps.push(["The idea", recap.idea_date]);
  if(recap && recap.vision_date) steps.push(["Graded Vision", recap.vision_date]);
  if(recap && recap.increments != null) steps.push(["Building", `${recap.increments} increment${Number(recap.increments)===1?"":"s"}`]);
  if(recap && recap.first_alive) steps.push(["Living", recap.first_alive]);
  if(!steps.length) return null;
  const section = el("section", {class:"living-block", "aria-label":"From a sentence to this"},
    el("h2", {text:"From a sentence to this"})
  );
  const journey = el("div", {class:"journey"});
  steps.forEach((step, i) => {
    const last = i === steps.length - 1;
    journey.appendChild(el("div", {class:"journey-step"},
      el("div", {class:"journey-rail"},
        el("span", {class:"journey-node" + (last && data && data.running === true ? " now" : "")}),
        last ? null : el("span", {class:"journey-line"})
      ),
      el("div", {class:"journey-body"},
        el("div", {class:"journey-title", text:step[0]}),
        el("div", {class:"journey-date", text:String(step[1])})
      )
    ));
  });
  section.appendChild(journey);
  return section;
}

function route(){
  renderShellChrome();
  const livingCode = livingRouteCode();
  if(livingCode){ stopBuildPolling(); renderLiving(livingCode); return; }
  stopLivingPolling();
  const buildCode = buildRouteCode();
  if(buildCode){ renderBuild(buildCode); return; }
  stopBuildPolling();
  if(location.hash === "#/new" || location.pathname === "/new") renderNew();
  else if(location.hash === "#/needs" || location.hash === "#needs" || location.pathname === "/needs") renderNeeds();
  else load();
}

// init: route first; API 401/403 flips to the sign-in screen (load()/submit handlers handle it).
function init(){ route(); }
window.addEventListener("hashchange", route);
window.FOPSIdeaVision = {
  samples, validVision, renderVision, renderGrade, storyText, formatGrade, programName,
  getState:()=>draftState, setState:s=>{ draftState = Object.assign(draftState, s || {}); }
};
window.FOPSNeedsYou = {
  actionSet, ageFrom, kindLabel, applyNeedsData,
  getState:()=>needsState, setState:s=>{ needsState = Object.assign(needsState, s || {}); }
};
window.FOPSBuild = {
  BUILD_POLL_MS, BUILD_FEED_CAP, buildRouteCode, renderBuild, fetchBuild, stopBuildPolling,
  isBuildDegraded, phaseClass, renderBuildSpec, renderBuildFeed, renderStalls,
  getState:()=>buildState, setState:s=>{ buildState = Object.assign(buildState, s || {}); }
};
window.FOPSLiving = {
  LIVING_FEATURE_CAP, livingRouteCode, renderLiving, fetchLiving, stopLivingPolling, renderLivingShell,
  renderLivingRunning, renderLivingFeatures, featureAssuranceStrip, renderLivingRecap,
  getState:()=>livingState, setState:s=>{ livingState = Object.assign(livingState, s || {}); }
};
init();
</script>
</body>
</html>
